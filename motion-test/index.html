<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MPC Master Dummy Static QA</title>
  <style>
    :root {
      --ink: #101010;
      --muted: #555;
      --panel: #ffffff;
      --line: #d7d7d7;
      --grid: #ececec;
      --accent: #6fbd45;
      --bg: #f4f4f4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    .app {
      width: min(100%, 760px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 16px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 14px;
    }

    .top {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
    }

    .top h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .top p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 16px;
    }

    .badge,
    .pill {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      font-weight: 800;
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.04);
    }

    .badge {
      white-space: nowrap;
    }

    .stage {
      position: relative;
      min-height: 540px;
      height: min(64vh, 700px);
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 42px 42px;
      opacity: 0.55;
    }

    .toon {
      position: absolute;
      left: 50%;
      top: 56%;
      width: clamp(330px, 72vw, 500px);
      aspect-ratio: 1 / 1;
      transform: translate(-50%, -50%);
    }

    .toon img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .controls {
      display: grid;
      justify-items: center;
      gap: 12px;
    }

    .frame-readout {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      color: var(--muted);
      font-size: 14px;
    }

    .links a {
      color: #255f14;
      font-weight: 800;
    }

    .dpad {
      width: 188px;
      height: 188px;
      display: grid;
      grid-template: 1fr 1fr 1fr / 1fr 1fr 1fr;
      gap: 10px;
    }

    .btn {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      color: var(--ink);
      font-size: 28px;
      font-weight: 900;
      cursor: pointer;
    }

    .btn.active {
      border-color: var(--accent);
      background: #effbe9;
    }

    .up {
      grid-column: 2;
      grid-row: 1;
    }

    .left {
      grid-column: 1;
      grid-row: 2;
    }

    .down {
      grid-column: 2;
      grid-row: 2;
    }

    .right {
      grid-column: 3;
      grid-row: 2;
    }

    @media (max-width: 520px) {
      .app {
        padding: 12px;
      }

      .top h1 {
        font-size: 20px;
      }

      .stage {
        min-height: 470px;
      }

      .frame-readout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <div>
        <h1>MPC Master Dummy Static QA</h1>
        <p>Static four-view PNG build</p>
      </div>
      <div class="badge" id="status">Front view</div>
    </header>

    <section class="stage" aria-label="MPC toon static preview">
      <div class="grid"></div>
      <div class="toon" id="toon">
        <img id="body" alt="">
      </div>
    </section>

    <section class="controls">
      <div class="frame-readout">
        <div class="pill" id="label">body_front_idle_01.png</div>
        <div class="pill" id="loadStatus">Loading frames</div>
      </div>
      <div class="links">
        <a href="../exports/qa/static-master-dummy-v1-contact-sheet.png">Static contact sheet</a>
        <span>Build: <code>npm run qa</code></span>
      </div>
      <div class="dpad" aria-label="Direction controls">
        <button class="btn up" type="button" data-d="back" aria-label="View back">&#9650;</button>
        <button class="btn left" type="button" data-d="left" aria-label="View left">&#9664;</button>
        <button class="btn down active" type="button" data-d="front" aria-label="View front">&#9660;</button>
        <button class="btn right" type="button" data-d="right" aria-label="View right">&#9654;</button>
      </div>
    </section>
  </main>

  <script>
    const state = { f: "front" };
    const directions = ["front", "back", "left", "right"];
    const body = document.getElementById("body");
    const statusEl = document.getElementById("status");
    const label = document.getElementById("label");
    const loadStatus = document.getElementById("loadStatus");
    const buttons = [...document.querySelectorAll(".btn")];
    const assetVersion = "static-four-view-side-redraw-20260625";

    function framePath(direction) {
      return `../master-dummy/v1/body/${direction}/idle/body_${direction}_idle_01.png?v=${assetVersion}`;
    }

    function draw() {
      body.src = framePath(state.f);
      label.textContent = `body_${state.f}_idle_01.png`;
      statusEl.textContent = `${state.f[0].toUpperCase()}${state.f.slice(1)} view`;
      buttons.forEach((button) => button.classList.toggle("active", button.dataset.d === state.f));
    }

    function setDir(direction) {
      state.f = direction;
      draw();
    }

    function preloadFrames() {
      let loaded = 0;
      let failed = 0;
      const paths = directions.map(framePath);
      paths.forEach((src) => {
        const img = new Image();
        img.onload = () => {
          loaded += 1;
          loadStatus.textContent = `${loaded}/${paths.length} loaded`;
        };
        img.onerror = () => {
          failed += 1;
          loadStatus.textContent = `${failed} missing`;
        };
        img.src = src;
      });
    }

    buttons.forEach((button) => {
      button.addEventListener("click", () => setDir(button.dataset.d));
    });

    preloadFrames();
    draw();
  </script>
</body>
</html>
