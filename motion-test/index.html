<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MPC Motion Test</title><style>body{margin:0;background:#f6f6f6;font-family:Arial;color:#111}.app{max-width:520px;margin:0 auto;min-height:100vh;display:grid;grid-template-rows:auto 1fr auto;gap:12px;padding:14px}.top{display:flex;justify-content:space-between}.top h1{font-size:20px;margin:0}.top p{margin:4px 0 0;color:#666}.badge,.pill{background:#fff;border:1px solid #ddd;border-radius:12px;padding:8px 10px;font-weight:800}.stage{position:relative;background:#fff;border:2px solid #ddd;border-radius:18px;overflow:hidden;min-height:58vh}.grid{position:absolute;inset:0;background-image:linear-gradient(#eee 1px,transparent 1px),linear-gradient(90deg,#eee 1px,transparent 1px);background-size:42px 42px;opacity:.28}.toon{position:absolute;width:150px;height:188px;left:50%;top:58%;transform:translate(-50%,-50%)}.toon img{width:100%;height:100%;object-fit:contain}.controls{display:grid;justify-items:center;gap:9px}.dpad{width:188px;height:188px;display:grid;grid-template:1fr 1fr 1fr/1fr 1fr 1fr;gap:10px}.btn{border:1px solid #ddd;border-radius:18px;background:white;font-size:28px;font-weight:900}.btn.active{background:#e9ffe9}.up{grid-column:2;grid-row:1}.left{grid-column:1;grid-row:2}.down{grid-column:2;grid-row:2}.right{grid-column:3;grid-row:2}.qa{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;font-size:12px}</style></head><body><main class="app"><header class="top"><div><h1>MPC Toon Motion Test</h1><p>Frame-pack v1 — 8 idle / 12 walk</p></div><div class="badge" id="status">Idle Front</div></header><section class="stage"><div class="grid"></div><div class="toon" id="toon"><img id="avatar" alt="MPC frame"></div></section><section class="controls"><div class="dpad"><button class="btn up" data-d="up">▲</button><button class="btn left" data-d="left">◀</button><button class="btn down" data-d="down">▼</button><button class="btn right" data-d="right">▶</button></div><div class="qa"><span class="pill" id="frame">body_front_idle_01</span><span class="pill">MPC_FRAME_PACK_V1</span></div></section></main><script src="frame-pack-v1.js"></script><script>let s={d:null,f:'front',i:0,x:.5,y:.58,last:0};const av=document.getElementById('avatar'),toon=document.getElementById('toon'),status=document.getElementById('status'),label=document.getElementById('frame'),bs=[...document.querySelectorAll('.btn')];function key(){return(s.d?'walk':'idle')+'_'+s.f}function draw(){let id=MPC_FRAME_PACK_V1.FRAME_PACK[key()][s.i%MPC_FRAME_PACK_V1.FRAME_PACK[key()].length];MPC_FRAME_PACK_V1.renderFrame(av,id);label.textContent=id;toon.style.left=s.x*100+'%';toon.style.top=s.y*100+'%'}function setD(d){s.d=d;if(d)s.f={up:'back',down:'front',left:'left',right:'right'}[d];s.i=0;status.textContent=d?'Walk '+s.f:'Idle '+s.f;bs.forEach(b=>b.classList.toggle('active',b.dataset.d===d));draw()}bs.forEach(b=>{b.onpointerdown=e=>{e.preventDefault();setD(b.dataset.d)};b.onpointerup=b.onpointercancel=b.onpointerleave=e=>{e.preventDefault();setD(null)}});function loop(t){if(t-s.last>83){s.last=t;s.i++;if(s.d){if(s.d==='up')s.y-=.01;if(s.d==='down')s.y+=.01;if(s.d==='left')s.x-=.01;if(s.d==='right')s.x+=.01}s.x=Math.max(.15,Math.min(.85,s.x));s.y=Math.max(.18,Math.min(.82,s.y));draw()}requestAnimationFrame(loop)}draw();requestAnimationFrame(loop)</script></body></html>
