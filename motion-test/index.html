<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>MPC Toon Motion Test</title>
<style>
:root{--bg:#f6f6f6;--card:#fff;--line:#ddd;--text:#111;--muted:#666;--green:#36c45a}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Arial,Helvetica,sans-serif;color:var(--text);touch-action:none}.app{min-height:100vh;display:grid;grid-template-rows:auto 1fr auto;gap:12px;padding:14px;max-width:520px;margin:0 auto}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.top h1{font-size:20px;margin:0 0 4px}.top p{margin:0;color:var(--muted);font-size:13px}.badge{background:#fff;border:1px solid var(--line);border-radius:12px;padding:8px 10px;font-weight:800;font-size:13px;white-space:nowrap}.stage{position:relative;background:#fff;border:2px solid var(--line);border-radius:18px;overflow:hidden;min-height:58vh}.grid{position:absolute;inset:0;background-image:linear-gradient(#eee 1px,transparent 1px),linear-gradient(90deg,#eee 1px,transparent 1px);background-size:42px 42px;opacity:.28}.toon{position:absolute;width:170px;height:210px;left:50%;top:58%;transform:translate(-50%,-50%)}svg{width:100%;height:100%;overflow:visible}.skin{fill:#ffc47d;stroke:#111;stroke-width:3.2;stroke-linecap:round;stroke-linejoin:round}.shorts{fill:#191919;stroke:#111;stroke-width:3;stroke-linejoin:round}.line{fill:none;stroke:#111;stroke-width:2.5;stroke-linecap:round}.shadow{fill:rgba(0,0,0,.10)}.controls{display:grid;justify-items:center;gap:9px}.hint{font-size:13px;color:var(--muted)}.dpad{width:210px;height:210px;display:grid;grid-template:1fr 1fr 1fr/1fr 1fr 1fr;gap:10px}.btn{border:1px solid var(--line);border-radius:18px;background:#fff;font-size:28px;font-weight:900;box-shadow:0 2px 10px #0001;touch-action:none}.btn.active,.btn:active{background:#e9ffe9;border-color:#9be7a9}.up{grid-column:2;grid-row:1}.left{grid-column:1;grid-row:2}.down{grid-column:2;grid-row:2}.right{grid-column:3;grid-row:2}.qa{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;font-size:12px;color:#333}.pill{background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 8px}@media(max-width:420px){.toon{width:150px;height:190px}.dpad{width:188px;height:188px}.stage{min-height:55vh}}
</style>
</head>
<body>
<main class="app">
<header class="top"><div><h1>MPC Toon Motion Test</h1><p>Phase 1 QA — mobile D-pad prototype</p></div><div class="badge" id="status">Idle Front</div></header>
<section class="stage" id="stage"><div class="grid"></div><div class="toon" id="toon"><svg id="avatar" viewBox="0 0 240 300" aria-label="MPC Master Dummy"><ellipse class="shadow" cx="120" cy="282" rx="54" ry="9"/><g id="root"><g id="body"><path id="torso" class="skin" d="M72 142 C67 169 68 213 79 232 L161 232 C172 213 173 169 168 142 C158 122 139 114 120 114 C101 114 82 122 72 142Z"/><g id="legs"><path id="legL" class="skin" d="M86 219 C80 241 80 265 84 272 C93 279 113 277 117 270 L112 219Z"/><path id="legR" class="skin" d="M128 219 L123 270 C127 277 147 279 156 272 C160 265 160 241 154 219Z"/><path id="footL" class="skin" d="M83 267 C69 272 68 286 86 288 L116 286 C121 278 113 269 99 268Z"/><path id="footR" class="skin" d="M157 267 C171 272 172 286 154 288 L124 286 C119 278 127 269 141 268Z"/></g><path id="shorts" class="shorts" d="M77 208 L163 208 L160 236 L123 236 L120 221 L117 236 L80 236Z"/><g id="armL"><path class="line" d="M73 154 C65 176 63 198 68 211"/><circle class="skin" cx="67" cy="212" r="18"/></g><g id="armR"><path class="line" d="M167 154 C175 176 177 198 172 211"/><circle class="skin" cx="173" cy="212" r="18"/></g></g><g id="head"><circle class="skin" cx="120" cy="76" r="68"/><ellipse class="skin" cx="51" cy="84" rx="16" ry="22"/><ellipse class="skin" cx="189" cy="84" rx="16" ry="22"/><path class="line" d="M48 85 C56 78 60 91 52 96"/><path class="line" d="M192 85 C184 78 180 91 188 96"/></g></g></svg></div></section>
<section class="controls"><div class="hint">Hold a direction. Release to idle. Keyboard arrows/WASD also work.</div><div class="dpad"><button class="btn up" data-dir="up">▲</button><button class="btn left" data-dir="left">◀</button><button class="btn down" data-dir="down">▼</button><button class="btn right" data-dir="right">▶</button></div><div class="qa"><span class="pill">White background</span><span class="pill">Locked proportions</span><span class="pill">AAA timing test</span></div></section>
</main>
<script>
const state={dir:null,facing:'front',x:.5,y:.58,frame:0,last:0,lastMove:performance.now(),fps:12,speed:.23};
const toon=document.getElementById('toon'),statusEl=document.getElementById('status'),buttons=[...document.querySelectorAll('.btn')];
const el={root:document.getElementById('root'),body:document.getElementById('body'),head:document.getElementById('head'),armL:document.getElementById('armL'),armR:document.getElementById('armR'),legL:document.getElementById('legL'),legR:document.getElementById('legR'),footL:document.getElementById('footL'),footR:document.getElementById('footR'),shorts:document.getElementById('shorts')};
function cap(s){return s[0].toUpperCase()+s.slice(1)}
function setDir(d){state.dir=d;if(d)state.facing={up:'back',down:'front',left:'left',right:'right'}[d];state.frame=0;buttons.forEach(b=>b.classList.toggle('active',b.dataset.dir===d));statusEl.textContent=d?'Walk '+cap(state.facing):'Idle '+cap(state.facing)}
function reset(){Object.values(el).forEach(e=>e.setAttribute('transform',''));}
function applyPose(){reset();const t=state.frame;const a=Math.sin((t/12)*Math.PI*2),b=Math.cos((t/12)*Math.PI*2);let bob=0;if(state.dir)bob=(b>0?2:-1);else bob=Math.sin((t/8)*Math.PI*2)*1.6;el.root.setAttribute('transform',`translate(0 ${bob})`);if(state.facing==='left'||state.facing==='right'){const sx=state.facing==='left'?-1:1;el.root.setAttribute('transform',`translate(120 ${bob}) scale(${sx} 1) translate(-120 0)`);el.head.setAttribute('transform','translate(0 0) scale(.78 1)');el.body.setAttribute('transform','translate(0 6) scale(.62 1)');el.armL.setAttribute('transform',`translate(${a*8} 0)`);el.armR.setAttribute('transform',`translate(${-a*8} 0)`);if(state.dir){el.legL.setAttribute('transform',`translate(${a*10} ${Math.max(0,-b)*5}) rotate(${a*8} 100 230)`);el.legR.setAttribute('transform',`translate(${-a*10} ${Math.max(0,b)*5}) rotate(${-a*8} 140 230)`);el.footL.setAttribute('transform',`translate(${a*13} ${Math.max(0,-b)*3})`);el.footR.setAttribute('transform',`translate(${-a*13} ${Math.max(0,b)*3})`);}return;}if(state.facing==='back'){el.head.setAttribute('transform','translate(0 0) scale(1 .98)');if(state.dir){el.armL.setAttribute('transform',`translate(${a*3} 0)`);el.armR.setAttribute('transform',`translate(${-a*3} 0)`);el.legL.setAttribute('transform',`translate(${a*5} ${Math.max(0,-b)*4})`);el.legR.setAttribute('transform',`translate(${-a*5} ${Math.max(0,b)*4})`);el.footL.setAttribute('transform',`translate(${a*7} ${Math.max(0,-b)*3})`);el.footR.setAttribute('transform',`translate(${-a*7} ${Math.max(0,b)*3})`);}return;}if(state.dir){el.armL.setAttribute('transform',`translate(${a*3} 0)`);el.armR.setAttribute('transform',`translate(${-a*3} 0)`);el.legL.setAttribute('transform',`translate(${a*4} ${Math.max(0,-b)*5})`);el.legR.setAttribute('transform',`translate(${-a*4} ${Math.max(0,b)*5})`);el.footL.setAttribute('transform',`translate(${a*6} ${Math.max(0,-b)*3})`);el.footR.setAttribute('transform',`translate(${-a*6} ${Math.max(0,b)*3})`);}}
function clamp(n,min,max){return Math.max(min,Math.min(max,n))}
function loop(now){const dt=(now-state.lastMove)/1000;state.lastMove=now;if(state.dir){const s=state.speed*dt;if(state.dir==='up')state.y-=s;if(state.dir==='down')state.y+=s;if(state.dir==='left')state.x-=s;if(state.dir==='right')state.x+=s;state.x=clamp(state.x,.15,.85);state.y=clamp(state.y,.18,.82);}if(now-state.last>1000/state.fps){state.last=now;state.frame=(state.frame+1)%(state.dir?12:8);applyPose();}toon.style.left=(state.x*100)+'%';toon.style.top=(state.y*100)+'%';requestAnimationFrame(loop)}
buttons.forEach(btn=>{const d=btn.dataset.dir;btn.addEventListener('pointerdown',e=>{e.preventDefault();setDir(d)});['pointerup','pointercancel','pointerleave'].forEach(ev=>btn.addEventListener(ev,e=>{e.preventDefault();setDir(null)}));});
window.addEventListener('keydown',e=>{if(e.repeat)return;const m={ArrowUp:'up',w:'up',W:'up',ArrowDown:'down',s:'down',S:'down',ArrowLeft:'left',a:'left',A:'left',ArrowRight:'right',d:'right',D:'right'};if(m[e.key])setDir(m[e.key])});
window.addEventListener('keyup',e=>{if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','W','a','A','s','S','d','D'].includes(e.key))setDir(null)});
applyPose();requestAnimationFrame(loop);
</script>
</body>
</html>
