<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>MPC Toon Motion Test</title>
<style>
:root{--bg:#f6f6f6;--card:#fff;--line:#ddd;--text:#111;--muted:#666}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Arial,Helvetica,sans-serif;color:var(--text);touch-action:none}.app{min-height:100vh;display:grid;grid-template-rows:auto 1fr auto;gap:12px;padding:14px;max-width:520px;margin:0 auto}.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.top h1{font-size:20px;margin:0 0 4px}.top p{margin:0;color:var(--muted);font-size:13px}.badge{background:#fff;border:1px solid var(--line);border-radius:12px;padding:8px 10px;font-weight:800;font-size:13px;white-space:nowrap}.stage{position:relative;background:#fff;border:2px solid var(--line);border-radius:18px;overflow:hidden;min-height:58vh}.grid{position:absolute;inset:0;background-image:linear-gradient(#eee 1px,transparent 1px),linear-gradient(90deg,#eee 1px,transparent 1px);background-size:42px 42px;opacity:.28}.toon{position:absolute;width:172px;height:212px;left:50%;top:58%;transform:translate(-50%,-50%)}svg{width:100%;height:100%;overflow:visible}.skin{fill:#f6c27e;stroke:#111;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}.shorts{fill:#1d1d1d;stroke:#111;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}.line{fill:none;stroke:#111;stroke-width:2.3;stroke-linecap:round;stroke-linejoin:round}.shadow{fill:rgba(0,0,0,.10)}.controls{display:grid;justify-items:center;gap:9px}.hint{font-size:13px;color:var(--muted)}.dpad{width:210px;height:210px;display:grid;grid-template:1fr 1fr 1fr/1fr 1fr 1fr;gap:10px}.btn{border:1px solid var(--line);border-radius:18px;background:#fff;font-size:28px;font-weight:900;box-shadow:0 2px 10px #0001;touch-action:none}.btn.active,.btn:active{background:#e9ffe9;border-color:#9be7a9}.up{grid-column:2;grid-row:1}.left{grid-column:1;grid-row:2}.down{grid-column:2;grid-row:2}.right{grid-column:3;grid-row:2}.qa{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;font-size:12px;color:#333}.pill{background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 8px}@media(max-width:420px){.toon{width:150px;height:188px}.dpad{width:188px;height:188px}.stage{min-height:55vh}}
</style>
</head>
<body>
<main class="app">
<header class="top"><div><h1>MPC Toon Motion Test</h1><p>Phase 1 QA — corrected turnaround v2</p></div><div class="badge" id="status">Idle Front</div></header>
<section class="stage"><div class="grid"></div><div class="toon" id="toon"><svg viewBox="0 0 240 300" aria-label="MPC Master Dummy"><g id="root"></g></svg></div></section>
<section class="controls"><div class="hint">Hold a direction. Release to idle. Keyboard arrows/WASD also work.</div><div class="dpad"><button class="btn up" data-dir="up">▲</button><button class="btn left" data-dir="left">◀</button><button class="btn down" data-dir="down">▼</button><button class="btn right" data-dir="right">▶</button></div><div class="qa"><span class="pill">Distinct back</span><span class="pill">Side profile fixed</span><span class="pill">QA v2</span></div></section>
</main>
<script>
const NS='http://www.w3.org/2000/svg';
const root=document.getElementById('root'),toon=document.getElementById('toon'),statusEl=document.getElementById('status'),buttons=[...document.querySelectorAll('.btn')];
const state={dir:null,facing:'front',x:.5,y:.58,frame:0,last:0,lastMove:performance.now(),fps:12,speed:.23};
const E=(t,a={})=>{const n=document.createElementNS(NS,t);Object.entries(a).forEach(([k,v])=>n.setAttribute(k,v));return n};
const add=(p,c)=>p.appendChild(c);
const cap=s=>s[0].toUpperCase()+s.slice(1);
function setDir(d){state.dir=d;if(d)state.facing={up:'back',down:'front',left:'left',right:'right'}[d];state.frame=0;buttons.forEach(b=>b.classList.toggle('active',b.dataset.dir===d));statusEl.textContent=d?'Walk '+cap(state.facing):'Idle '+cap(state.facing)}
function clamp(n,min,max){return Math.max(min,Math.min(max,n))}
function front(step,idle){const a=Math.sin(step/12*Math.PI*2),b=Math.cos(step/12*Math.PI*2),bob=idle?Math.sin(step/8*Math.PI*2)*1.5:(b>0?2:-1),g=E('g',{transform:`translate(0 ${bob})`});add(g,E('ellipse',{cx:120,cy:282,rx:56,ry:9,class:'shadow'}));const fl=idle?0:Math.max(0,-b)*5,fr=idle?0:Math.max(0,b)*5,sl=idle?0:a*4,sr=idle?0:-a*4;add(g,E('path',{d:`M84 ${219+fl}C80 ${241+fl} 80 ${265+fl} 84 ${272+fl}C93 ${279+fl} 113 ${277+fl} 117 ${270+fl}L112 ${219+fl}Z`,class:'skin',transform:`translate(${sl} 0)`}));add(g,E('path',{d:`M128 ${219+fr}L123 ${270+fr}C127 ${277+fr} 147 ${279+fr} 156 ${272+fr}C160 ${265+fr} 160 ${241+fr} 154 ${219+fr}Z`,class:'skin',transform:`translate(${sr} 0)`}));add(g,E('path',{d:`M83 ${267+fl}C69 ${272+fl} 68 ${286+fl} 86 ${288+fl}L116 ${286+fl}C121 ${278+fl} 113 ${269+fl} 99 ${268+fl}Z`,class:'skin',transform:`translate(${sl} 0)`}));add(g,E('path',{d:`M157 ${267+fr}C171 ${272+fr} 172 ${286+fr} 154 ${288+fr}L124 ${286+fr}C119 ${278+fr} 127 ${269+fr} 141 ${268+fr}Z`,class:'skin',transform:`translate(${sr} 0)`}));add(g,E('path',{d:'M72 142C67 169 68 213 79 232L161 232C172 213 173 169 168 142C158 122 139 114 120 114C101 114 82 122 72 142Z',class:'skin'}));add(g,E('path',{d:'M77 208L163 208L160 236L123 236L120 221L117 236L80 236Z',class:'shorts'}));const as=idle?Math.sin(step/8*Math.PI*2)*1.1:a*3;add(g,E('path',{d:'M73 154C65 176 63 198 68 211',class:'line',transform:`translate(${as} 0)`}));add(g,E('circle',{cx:67+as,cy:212,r:18,class:'skin'}));add(g,E('path',{d:'M167 154C175 176 177 198 172 211',class:'line',transform:`translate(${-as} 0)`}));add(g,E('circle',{cx:173-as,cy:212,r:18,class:'skin'}));add(g,E('circle',{cx:120,cy:76,r:68,class:'skin'}));add(g,E('ellipse',{cx:51,cy:84,rx:16,ry:22,class:'skin'}));add(g,E('ellipse',{cx:189,cy:84,rx:16,ry:22,class:'skin'}));add(g,E('path',{d:'M48 85C56 78 60 91 52 96',class:'line'}));add(g,E('path',{d:'M192 85C184 78 180 91 188 96',class:'line'}));return g}
function back(step,idle){const g=front(step,idle);const head=g.querySelector('circle[cx="120"]');g.querySelectorAll('path.line').forEach(x=>x.remove());add(g,E('path',{d:'M78 156C73 177 72 197 76 211',class:'line'}));add(g,E('path',{d:'M162 156C167 177 168 197 164 211',class:'line'}));return g}
function side(face,step,idle){const a=Math.sin(step/12*Math.PI*2),b=Math.cos(step/12*Math.PI*2),bob=idle?0:(b>0?2:-1),m=face==='right'?-1:1,g=E('g',{transform:`translate(${m<0?240:0} ${bob}) scale(${m} 1)`});add(g,E('ellipse',{cx:120,cy:282,rx:48,ry:8,class:'shadow'}));const backStep=idle?0:-a*7,frontStep=idle?0:a*11,backLift=idle?0:Math.max(0,b)*5,frontLift=idle?0:Math.max(0,-b)*4;add(g,E('path',{d:`M103 ${214+backLift}C100 ${238+backLift} 100 ${264+backLift} 103 ${272+backLift}C108 ${277+backLift} 120 ${277+backLift} 124 ${271+backLift}L120 ${214+backLift}Z`,class:'skin',transform:`translate(${backStep} 0)`}));add(g,E('path',{d:`M103 ${267+backLift}C94 ${270+backLift} 93 ${282+backLift} 105 ${284+backLift}L123 ${283+backLift}C127 ${278+backLift} 122 ${269+backLift} 114 ${268+backLift}Z`,class:'skin',transform:`translate(${backStep} 0)`}));add(g,E('path',{d:'M106 143C101 167 101 211 109 232L139 232C147 211 147 167 142 143C138 127 129 117 121 114C112 117 109 126 106 143Z',class:'skin'}));const af=idle?0:a*5,ab=idle?0:-a*3;add(g,E('path',{d:'M110 157C104 174 102 196 107 210',class:'line',transform:`translate(${af} 0)`}));add(g,E('circle',{cx:107+af,cy:212,r:18,class:'skin'}));add(g,E('path',{d:'M138 157C145 175 146 197 142 210',class:'line',transform:`translate(${ab} 0)`}));add(g,E('circle',{cx:142+ab,cy:212,r:14,class:'skin'}));add(g,E('path',{d:'M102 208L139 208L141 235L133 238L104 235Z',class:'shorts'}));add(g,E('path',{d:`M121 ${214+frontLift}C118 ${238+frontLift} 118 ${264+frontLift} 121 ${272+frontLift}C128 ${278+frontLift} 145 ${278+frontLift} 150 ${270+frontLift}L145 ${214+frontLift}Z`,class:'skin',transform:`translate(${frontStep} 0)`}));add(g,E('path',{d:`M120 ${267+frontLift}C107 ${272+frontLift} 108 ${286+frontLift} 125 ${288+frontLift}L152 ${286+frontLift}C159 ${279+frontLift} 151 ${269+frontLift} 138 ${268+frontLift}Z`,class:'skin',transform:`translate(${frontStep} 0)`}));add(g,E('ellipse',{cx:125,cy:76,rx:55,ry:68,class:'skin'}));add(g,E('ellipse',{cx:129,cy:88,rx:13,ry:19,class:'skin'}));add(g,E('path',{d:'M126 88C132 82 136 94 128 99',class:'line'}));return g}
function draw(){root.innerHTML='';if(state.facing==='front')add(root,front(state.frame,!state.dir));else if(state.facing==='back')add(root,back(state.frame,!state.dir));else add(root,side(state.facing,state.frame,!state.dir))}
function loop(now){const dt=(now-state.lastMove)/1000;state.lastMove=now;if(state.dir){const s=state.speed*dt;if(state.dir==='up')state.y-=s;if(state.dir==='down')state.y+=s;if(state.dir==='left')state.x-=s;if(state.dir==='right')state.x+=s;state.x=clamp(state.x,.15,.85);state.y=clamp(state.y,.18,.82)}if(now-state.last>1000/state.fps){state.last=now;state.frame=(state.frame+1)%(state.dir?12:8);draw()}toon.style.left=state.x*100+'%';toon.style.top=state.y*100+'%';requestAnimationFrame(loop)}
buttons.forEach(btn=>{const d=btn.dataset.dir;btn.addEventListener('pointerdown',e=>{e.preventDefault();setDir(d)});['pointerup','pointercancel','pointerleave'].forEach(ev=>btn.addEventListener(ev,e=>{e.preventDefault();setDir(null)}))});
window.addEventListener('keydown',e=>{if(e.repeat)return;const m={ArrowUp:'up',w:'up',W:'up',ArrowDown:'down',s:'down',S:'down',ArrowLeft:'left',a:'left',A:'left',ArrowRight:'right',d:'right',D:'right'};if(m[e.key])setDir(m[e.key])});
window.addEventListener('keyup',e=>{if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','W','a','A','s','S','d','D'].includes(e.key))setDir(null)});draw();requestAnimationFrame(loop);
</script>
</body>
</html>
