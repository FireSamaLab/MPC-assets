<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MPC Motion Test</title>
<style>
body{margin:0;font-family:Arial;background:#f6f6f6}.app{max-width:520px;margin:auto;padding:14px}.top{display:flex;justify-content:space-between;gap:10px}.top h1{font-size:20px;margin:0}.top p{margin:4px 0 0;color:#666}.badge,.pill{background:white;border:1px solid #ddd;border-radius:12px;padding:10px;font-weight:800}.stage{height:58vh;background:white;border:2px solid #ddd;border-radius:18px;position:relative;overflow:hidden}.grid{position:absolute;inset:0;background-image:linear-gradient(#eee 1px,transparent 1px),linear-gradient(90deg,#eee 1px,transparent 1px);background-size:42px 42px;opacity:.28}.toon{position:absolute;left:50%;top:58%;transform:translate(-50%,-50%)}canvas{width:150px;height:188px}.dpad{margin:12px auto;width:188px;height:188px;display:grid;grid-template:1fr 1fr 1fr/1fr 1fr 1fr;gap:10px}.btn{border:1px solid #ddd;border-radius:18px;background:white;font-size:28px;font-weight:900}.btn.active{background:#e9ffe9}.up{grid-column:2;grid-row:1}.left{grid-column:1;grid-row:2}.down{grid-column:2;grid-row:2}.right{grid-column:3;grid-row:2}
</style>
</head>
<body>
<main class="app">
  <div class="top"><div><h1>MPC Toon Motion Test</h1><p>Canvas frame-pack v1 visible build</p></div><div class="badge" id="st">Idle front</div></div>
  <section class="stage"><div class="grid"></div><div class="toon" id="toon"><canvas id="c" width="240" height="300"></canvas></div></section>
  <p class="pill" id="fr">body_front_idle_01</p>
  <div class="dpad"><button class="btn up" data-d="up">▲</button><button class="btn left" data-d="left">◀</button><button class="btn down" data-d="down">▼</button><button class="btn right" data-d="right">▶</button></div>
</main>
<script>
let S={d:null,f:'front',i:0,x:.5,y:.58,last:0},c=document.getElementById('c'),g=c.getContext('2d'),toon=document.getElementById('toon'),st=document.getElementById('st'),fr=document.getElementById('fr'),bs=[...document.querySelectorAll('button')];
function z(n){return String(n).padStart(2,'0')}function skin(){g.fillStyle='#f6c27e';g.strokeStyle='#111';g.lineWidth=3;g.lineCap='round';g.lineJoin='round'}function oval(x,y,rx,ry){g.beginPath();g.ellipse(x,y,rx,ry,0,0,Math.PI*2);g.fill();g.stroke()}function rect(x,y,w,h){g.beginPath();g.roundRect(x,y,w,h,8);g.fill();g.stroke()}function draw(){g.clearRect(0,0,240,300);let walk=!!S.d,n=S.i%(walk?12:8),t=n/(walk?12:8)*Math.PI*2,s=Math.sin(t),co=Math.cos(t),bob=walk?(co>0?2:-1):s*1.5;fr.textContent='body_'+S.f+'_'+(walk?'walk':'idle')+'_'+z(n+1);g.save();g.translate(0,bob);g.fillStyle='rgba(0,0,0,.12)';g.beginPath();g.ellipse(120,282,55,9,0,0,Math.PI*2);g.fill();skin();if(S.f==='left'||S.f==='right'){let m=S.f==='right'?-1:1,a=walk?s:0;g.translate(m<0?240:0,0);g.scale(m,1);oval(125,76,55,68);oval(129,88,13,19);rect(106,143,36,90);g.fillStyle='#1d1d1d';rect(102,208,39,28);skin();oval(108+a*4,212,18,18);oval(142-a*2,211,14,14);oval(112-a*7,255+Math.max(0,co)*4,16,35);oval(136+a*10,255+Math.max(0,-co)*4,18,35)}else{oval(120,76,68,68);oval(51,84,16,22);oval(189,84,16,22);rect(72,142,96,90);g.fillStyle='#1d1d1d';rect(77,208,86,28);skin();oval(67+s*3,212,18,18);oval(173-s*3,212,18,18);oval(100+s*4,252+Math.max(0,-co)*5,18,36);oval(140-s*4,252+Math.max(0,co)*5,18,36)}g.restore();toon.style.left=S.x*100+'%';toon.style.top=S.y*100+'%'}
function setD(d){S.d=d;if(d)S.f={up:'back',down:'front',left:'left',right:'right'}[d];S.i=0;st.textContent=d?'Walk '+S.f:'Idle '+S.f;bs.forEach(b=>b.classList.toggle('active',b.dataset.d===d));draw()}
bs.forEach(b=>{b.onpointerdown=e=>{e.preventDefault();setD(b.dataset.d)};b.onpointerup=b.onpointercancel=b.onpointerleave=e=>{e.preventDefault();setD(null)}});function loop(t){if(t-S.last>83){S.last=t;S.i++;if(S.d){if(S.d==='up')S.y-=.01;if(S.d==='down')S.y+=.01;if(S.d==='left')S.x-=.01;if(S.d==='right')S.x+=.01}S.x=Math.max(.15,Math.min(.85,S.x));S.y=Math.max(.18,Math.min(.82,S.y));draw()}requestAnimationFrame(loop)}draw();requestAnimationFrame(loop);
</script>
</body>
</html>
